<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h3>{{isEditMode ? 'Edit' : 'Add'}} Client</h3>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onSubmit()" #clientForm="ngForm">
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input 
                type="text" 
                class="form-control" 
                id="name" 
                name="name" 
                [(ngModel)]="client.name" 
                required>
            </div>
            
            <div class="mb-3">
              <label for="age" class="form-label">Age</label>
              <input 
                type="number" 
                class="form-control" 
                id="age" 
                name="age" 
                [(ngModel)]="client.age" 
                required 
                min="0">
            </div>
            
            <div class="d-flex justify-content-between">
              <button type="button" class="btn btn-secondary" routerLink="/clients">Cancel</button>
              <button type="submit" class="btn btn-primary" [disabled]="!clientForm.form.valid">
                {{isEditMode ? 'Update' : 'Create'}}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
