<div class="container mt-4">
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h3>Cars List</h3>
          <a routerLink="/cars/new" class="btn btn-primary">Add New Car</a>
        </div>
        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Model</th>
                <th>Type</th>
                <th>Plate Number</th>
                <th>Owner</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let car of cars">
                <td>{{car.id}}</td>
                <td>{{car.model}}</td>
                <td>{{car.type}}</td>
                <td>{{car.plateNumber}}</td>
                <td>{{car.clientName || 'Unknown'}}</td>
                <td>
                  <a [routerLink]="['/cars/edit', car.id]" class="btn btn-warning btn-sm me-2">Edit</a>
                  <button class="btn btn-danger btn-sm" (click)="deleteCar(car.id!)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
