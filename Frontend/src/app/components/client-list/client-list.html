<div class="container mt-4">
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h3>Clients List</h3>
          <a routerLink="/clients/new" class="btn btn-primary">Add New Client</a>
        </div>
        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let client of clients">
                <td>{{client.id}}</td>
                <td>{{client.name}}</td>
                <td>{{client.age}}</td>
                <td>
                  <button class="btn btn-info btn-sm me-2" (click)="viewClientCars(client)">View Cars</button>
                  <a [routerLink]="['/clients/edit', client.id]" class="btn btn-warning btn-sm me-2">Edit</a>
                  <button class="btn btn-danger btn-sm" (click)="deleteClient(client.id!)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal for client cars -->
<div class="modal" [class.show]="showCarsModal" [style.display]="showCarsModal ? 'block' : 'none'">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Cars owned by {{selectedClient?.name}}</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <ul class="list-group">
          <li *ngFor="let car of clientCars" class="list-group-item">
            <strong>{{car.model}}</strong> - {{car.type}} ({{car.plateNumber}})
          </li>
          <li *ngIf="clientCars.length === 0" class="list-group-item text-muted">
            No cars found for this client
          </li>
        </ul>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Close</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" *ngIf="showCarsModal"></div>
